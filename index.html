<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator AI Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">

    <!-- Loading Screen -->
    <div id="loader" class="fixed inset-0 flex items-center justify-center bg-black z-50">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-500 mx-auto mb-4"></div>
            <p class="text-green-500 font-mono">កំពុងភ្ជាប់ទៅម៉ាស៊ីនមេ AI...</p>
        </div>
    </div>

    <!-- Content -->
    <div id="content" class="hidden p-6 max-w-md mx-auto text-center">
        <h1 class="text-2xl font-bold text-green-400 mb-6">AVIATOR AI PREDICTOR</h1>
        
        <div class="bg-gray-800 p-6 rounded-2xl border border-blue-500 mb-6">
            <p class="text-sm text-gray-400">គណនីរបស់អ្នក៖</p>
            <p class="text-xl font-bold">កំពុងរង់ចាំការធ្វើឱ្យសកម្ម</p>
            <button id="btn" class="mt-4 w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold">
                ទទួលបានសញ្ញា (Get Signal)
            </button>
        </div>

        <div id="alert" class="hidden bg-red-900 p-4 rounded-xl border border-red-500">
            <p class="font-bold">⚠️ គណនីមិនទាន់សកម្ម</p>
            <p class="text-sm mt-2">សូមចុះឈ្មោះជាមួយកូដ៖ <strong>KHK888</strong></p>
            <a href="https://reffpa.com/L?tag=d_5623736m_45853c_&site=5623736&ad=45853&r=registration" class="mt-4 block bg-yellow-500 text-black py-2 rounded-lg font-bold">ចុះឈ្មោះឥឡូវនេះ</a>
        </div>
    </div>

    <script>
        // Принудительное скрытие лоадера через 2 секунды
        setTimeout(function() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('content').classList.remove('hidden');
        }, 2000);

        // Обработка кнопки
        document.getElementById('btn').onclick = function() {
            document.getElementById('alert').classList.remove('hidden');
            this.style.display = 'none';
        };
    </script>
</body>
</html>
